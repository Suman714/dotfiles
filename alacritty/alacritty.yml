import:
  - ~/.config/alacritty/themes/monokai_charcoal.yaml

window:
  opacity: 0.85

font:
  normal:
    family: Victor Mono
    style: regular

  italic:
    family: Victor Mono
    style: Italic

  bold_italic:
    family: Victor Mono
    style: Bold Italic

  size: 11

scrolling:
  history: 5000

key_bindings:
   - { key: V,        mods: Control|Shift, action: Paste            }
   - { key: C,        mods: Control|Shift, action: Copy             }

shell:
  program: /usr/bin/zsh
