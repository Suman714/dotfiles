import:
  - ~/.config/alacritty/themes/gruvbox_material.yml

window:
  opacity: 0.9

font:
  normal:
    family: ComicShannsMono Nerd Font
    style: regular

  italic:
    family: ComicShannsMono Nerd Font
    style: Italic

  bold_italic:
    family: ComicShannsMono Nerd Font
    style: Bold Italic

  size: 11

scrolling:
  history: 5000

key_bindings:
   - { key: V,        mods: Control|Shift, action: Paste            }
   - { key: C,        mods: Control|Shift, action: Copy             }

shell:
  program: /usr/bin/zsh
