import:
  - ~/.config/alacritty/themes/ubuntu.yaml

env:
  TERM: xterm-256color

window:
  opacity: 0.8

font:
  normal:
    family: JetBrainsMono Nerd Font
    style: regular

  italic:
    family: JetBrainsMono Nerd Font
    style: Italic

  bold_italic:
    family: JetBrainsMono Nerd Font
    style: Bold Italic

  size: 17

scrolling:
  history: 5000

key_bindings:
   - { key: V,        mods: Control|Shift, action: Paste            }
   - { key: C,        mods: Control|Shift, action: Copy             }
   - { key: Return,   mods: Alt,           action: ToggleFullscreen }


shell:
  program: /usr/bin/zsh

