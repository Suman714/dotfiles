import:
  - ~/.config/alacritty/themes/tokyo-night.yaml

env:
  TERM: xterm-256color

window:
  opacity: 0.93

font:
  normal:
    family: Victor Mono
    style: regular

  italic:
    family: Victor Mono
    style: Italic

  bold_italic:
    family: Victor Mono
    style: Bold Italic

  size: 12

scrolling:
  history: 5000

key_bindings:
   - { key: V,        mods: Control|Shift, action: Paste            }
   - { key: C,        mods: Control|Shift, action: Copy             }

shell:
  program: /usr/bin/zsh
